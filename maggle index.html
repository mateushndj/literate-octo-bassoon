<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maggle - Ultimate Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 15vh; height: 100vh; overflow: hidden; position: relative;
        }

        #matrix { position: absolute; top: 0; left: 0; z-index: -1; }

        /* Interface Principal */
        #main-ui { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 1; }
        h1 { font-size: 4.5rem; margin-bottom: 20px; font-weight: 800; letter-spacing: -2px; }
        .m { color: #4285F4; } .a { color: #EA4335; } .g1 { color: #FBBC05; } .g2 { color: #4285F4; } .l { color: #EA4335; } .e { color: #34A853; }

        .search-container { position: relative; width: 90%; max-width: 420px; display: flex; flex-direction: column; }
        .sound-wave { display: flex; align-items: flex-end; justify-content: center; gap: 4px; height: 45px; margin-bottom: 10px; }
        .bar { width: 6px; height: 10px; background: #00d4ff; border-radius: 3px; box-shadow: 0 0 10px #00d4ff; }
        input[type="text"] {
            width: 100%; padding: 16px 55px 16px 25px; font-size: 18px;
            background: rgba(10, 10, 10, 0.9); border: 2px solid #00d4ff;
            border-radius: 50px; color: white; outline: none;
        }

        /* VAULT SECRETO */
        #secret-area {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; padding: 15px; flex-direction: column;
        }
        .vault-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; width: 100%; }
        .tab-btn { 
            background: #111; border: 1px solid #333; color: #777; 
            padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; flex: 1;
        }
        .tab-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; font-weight: bold; }

        #media-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 5px; width: 100%; overflow-y: auto; flex-grow: 1;
        }
        .media-item { position: relative; aspect-ratio: 1/1; background: #111; border-radius: 4px; overflow: hidden; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Lista de Links */
        #links-list { display: none; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; width: 100%; }
        .link-item { 
            background: #111; border: 1px solid #333; padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .link-info { flex-grow: 1; color: #00d4ff; text-decoration: none; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .link-del { color: #ff4444; background: none; border: none; margin-left: 10px; font-weight: bold; }

        /* Slider */
        #slider-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; }
        .swiper-slide img, .swiper-slide video { max-width: 100%; max-height: 100%; }
        
        .close-slider, .del-btn { position: absolute; z-index: 210; padding: 10px 20px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 20px; }
        .close-slider { top: 20px; left: 20px; }
        .del-btn { bottom: 30px; background: rgba(255, 0, 0, 0.4); }

        .btn-add { background: #00d4ff; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body onclick="requestPermission()">

    <canvas id="matrix"></canvas>

    <div id="main-ui">
        <h1><span class="m">M</span><span class="a">a</span><span class="g1">g</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span></h1>
        <div class="search-container">
            <div class="sound-wave" id="visualizer"></div>
            <input type="text" id="searchInput" placeholder="Pesquisar" onkeypress="handleKey(event)">
        </div>
    </div>

    <div id="secret-area">
        <div class="vault-header">
            <button class="btn-add" onclick="addItem()">+</button>
            <h2 style="color:#00d4ff; font-size: 0.7rem;">VAULT 2008</h2>
            <button class="tab-btn" style="background:#ff4444; color:white; flex:none;" onclick="closeVault()">Sair</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-imgs" onclick="switchTab('image')">FOTOS</button>
            <button class="tab-btn" id="tab-vids" onclick="switchTab('video')">VÍDEOS</button>
            <button class="tab-btn" id="tab-links" onclick="switchTab('link')">LINKS</button>
        </div>

        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" onchange="saveMedia()">
        
        <div id="media-grid"></div>
        <div id="links-list"></div>
    </div>

    <div id="slider-viewer">
        <button class="close-slider" onclick="closeSlider()">Voltar</button>
        <div class="swiper"><div class="swiper-wrapper" id="swiper-content"></div></div>
    </div>

    <script>
        const pass = "Suetam2008!";
        let swiper;
        let currentTab = 'image';

        function executeSearch() {
            const val = document.getElementById('searchInput').value;
            if (val === pass) openVault();
            else if (val.trim() !== "") window.location.href = `https://duckduckgo.com/?q=${encodeURIComponent(val)}`;
        }
        function handleKey(e) { if (e.key === "Enter") executeSearch(); }

        function openVault() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('secret-area').style.display = 'flex';
            loadVault();
        }

        function switchTab(type) {
            currentTab = type;
            document.getElementById('tab-imgs').classList.toggle('active', type === 'image');
            document.getElementById('tab-vids').classList.toggle('active', type === 'video');
            document.getElementById('tab-links').classList.toggle('active', type === 'link');
            
            document.getElementById('media-grid').style.display = (type === 'link') ? 'none' : 'grid';
            document.getElementById('links-list').style.display = (type === 'link') ? 'flex' : 'none';
            loadVault();
        }

        function addItem() {
            if (currentTab === 'link') {
                const url = prompt("Cole o Link (URL):");
                if (url) {
                    const title = prompt("Dê um nome para o link:");
                    saveLink(url, title || url);
                }
            } else {
                document.getElementById('fileInput').click();
            }
        }

        async function saveLink(url, title) {
            await localforage.setItem(Date.now().toString(), {type: 'link', url: url, name: title});
            loadVault();
        }

        async function saveMedia() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                await localforage.setItem(Date.now().toString(), {type: file.type, data: e.target.result});
                loadVault();
            };
            reader.readAsDataURL(file);
        }

        async function loadVault() {
            const grid = document.getElementById('media-grid');
            const list = document.getElementById('links-list');
            grid.innerHTML = ""; list.innerHTML = "";
            let items = [];

            await localforage.iterate((val, key) => {
                if (val.type.startsWith(currentTab)) items.push({key, val});
            });

            items.forEach((item, index) => {
                if (currentTab === 'link') {
                    const div = document.createElement('div');
                    div.className = 'link-item';
                    div.innerHTML = `<a href="${item.val.url}" target="_blank" class="link-info">${item.val.name}</a>
                                     <button class="link-del" onclick="deleteItem('${item.key}')">X</button>`;
                    list.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'media-item';
                    div.innerHTML = currentTab === 'image' ? `<img src="${item.val.data}">` : `<video src="${item.val.data}"></video>`;
                    div.onclick = () => openSlider(items, index);
                    grid.appendChild(div);
                }
            });
        }

        function openSlider(items, startIndex) {
            const swContent = document.getElementById('swiper-content');
            swContent.innerHTML = "";
            items.forEach(item => {
                const slide = document.createElement('div'); slide.className = 'swiper-slide';
                const media = currentTab === 'image' ? `<img src="${item.val.data}">` : `<video src="${item.val.data}" controls autoplay></video>`;
                slide.innerHTML = `${media}<button class="del-btn" onclick="deleteItem('${item.key}')">Apagar Item</button>`;
                swContent.appendChild(slide);
            });
            document.getElementById('slider-viewer').style.display = 'block';
            swiper = new Swiper('.swiper', { initialSlide: startIndex });
        }

        async function deleteItem(key) {
            if(confirm("Apagar permanentemente?")) {
                await localforage.removeItem(key);
                closeSlider();
                loadVault();
            }
        }

        function closeSlider() { 
            document.getElementById('slider-viewer').style.display = 'none'; 
            if(swiper) swiper.destroy(); 
        }

        function closeVault() {
            document.getElementById('secret-area').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('searchInput').value = "";
        }

        // --- Matrix & Motion ---
        const bars = [];
        const vis = document.getElementById('visualizer');
        for(let i=0; i<12; i++) { const b = document.createElement('div'); b.className='bar'; vis.appendChild(b); bars.push(b); }
        window.addEventListener('deviceorientation', (e) => {
            bars.forEach((b, i) => b.style.height = Math.min(45, (Math.abs(e.gamma||0)*0.7) + (Math.random()*20) + (i*2))+'px');
        });
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#00d4ff"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText("0123456789"[Math.floor(Math.random()*10)], i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
        function requestPermission() { if(typeof DeviceOrientationEvent.requestPermission === 'function') DeviceOrientationEvent.requestPermission(); }
    </script>
</body>
</html>
